name: Budget Table 2 Night Update

on:
  schedule:
    - cron: "30 19 * * *"   # 1:00 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}
      MYSQLDATABASE: ${{ secrets.MYSQLDATABASE }}
      MYSQLHOST: ${{ secrets.MYSQLHOST }}
      MYSQLPASSWORD: ${{ secrets.MYSQLPASSWORD }}
      MYSQLPORT: ${{ secrets.MYSQLPORT }}
      MYSQLUSER: ${{ secrets.MYSQLUSER }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        run: python budget_planner/insertintoTable2.py
