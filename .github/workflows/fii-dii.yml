name: FII DII Daily Update

on:
  schedule:
    - cron: "0 13 * * *"   # 6:30 PM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python fii_dii/fetch_fii_dii.py