name: Budget Table 1 Update

on:
  schedule:
    - cron: "0 */5 * * *"   # every 5 hours
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python budget_planner/insertIntoTable1.py